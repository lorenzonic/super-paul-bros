name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pygbag
        run: pip install pygbag

      - name: Build with Pygbag
        # --ume_block 0  → no "click to start" overlay
        # --build        → headless build, no local server
        run: python -m pygbag --ume_block 0 --build .

      - name: Patch HTML (mobile + loading screen)
        run: python patch_html.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
